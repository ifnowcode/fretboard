<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fretboard</title>
<style>
  body { font-family:sans-serif; background:#111; color:#eee; }
  .controls { margin-bottom:10px; }
  select, input { padding:4px; margin-right:6px; }
  canvas { background:#222; border:1px solid #555; }
  #output {
    margin-top:10px;
    padding:8px 12px;
    width:100%;
    box-sizing:border-box;
    background:#181818;
    color:#eee;
    min-height:24px;
    font-family:monospace;
    white-space:pre-wrap;
  }
</style>

</head>
<body>

<div class="controls">
  <!-- Chord -->
  <label>Chord Root:
    <select id="chordRoot"></select>
  </label>
  <label>Chord Type:
    <select id="chordType"></select>
  </label>

  <!-- Scale -->
  <label>Scale Root:
    <select id="scaleRoot"></select>
  </label>
  <label>Scale Mode:
    <select id="scaleMode"></select>
  </label>

  <!-- Tuning -->
  <select id="tuning"></select>

  <!-- Toggles -->
  <label>
    <input type="checkbox" id="showScale" checked>
    Show Scale
  </label>
  <label>
    <input type="checkbox" id="flip">
    Flip Strings
  </label>
</div>

<canvas id="fretboard" width="1200" height="260"></canvas>

<div class="controls" id="textControls">
  <button id="genSongBtn">Generate Song</button>
  <button id="showAllKeys">Show All Keys</button>
  <button id="showResources">Show Resources</button>
  <button id="clearSong">Clear Song</button>
  <label>
    <input type="checkbox" id="hideScale">
    Hide Scale
  </label>
  <label>
    <input type="checkbox" id="hideChord">
    Hide Chord
  </label>
</div>

<div id="output"></div>
<script src="gensong.js"></script>
<script src="fretboard.js"></script>
<script>
const genSongBtn = document.getElementById("genSongBtn");
const showAllKeysBtn = document.getElementById("showAllKeys");
const showResourcesBtn = document.getElementById("showResources");
const clearSongBtn = document.getElementById("clearSong");
let gentext = "";
let randsong = "";
let resources = "";
const gs = new GenSong();

genSongBtn.addEventListener("click", () => {
  //textout("GenSong triggered…");
  gs.random();
  gentext = gs.song() + "\n" + resources;
  render();
});
showAllKeysBtn.addEventListener("click", () => {
  gentext = gs.song() + "\n" + gs.allKeys();
  render();
});
showResourcesBtn.addEventListener("click", () => {
  gentext = gs.song() + "\n" + gs.keyRef();
  render();
});
clearSongBtn.addEventListener("click", () => {
  gentext = "";
  gs.clear();
  render();
});
render();
</script>
</body>
</html>
